l_english:
 cult_papa_name:0 "Cult Papa"
 cult_papa_squire_name:0 "PapaLaCroix"

 cult_papa.0001.t:0 "The Ingenious Knight of the Waning Moon"
 cult_papa.0001.desc:0 "A gaunt knight in his great-grandfather's rusted armor rides into your courtyard on a swaybacked nag he loudly addresses as #EMP Moonbane, fiercest destrier in creation#!. Behind him trudges a round, weary squire leading a donkey.\n\nYour chamberlain whispers what is known: a minor gentleman of the provinces who read too many chivalric romances and too many treatises of the heavens, until his wits dried up and he sallied forth as a knight-errant of his own invention.\n\n\"I am Ser Cult Papa,\" the knight proclaims, sword aloft. \"I serve the Lady Conspiracy Dearest, the Dawn herself, fairest of all ladies — and I have sworn to unseat her ancient rival: the #EMP Moon#!, that pale usurper, that counterfeit lamp that apes her radiance with borrowed light and drags the very seas about in its jealousy. It must come down. I have made the necessary calculations: the enemy's weight, considerable; its garrison, none that I could observe; the ladders required, one, but of very great length. I shall bring it down. I ask only for a [ROOT.Char.GetLadyLord] with the greatness of soul to share so high an emprise.\"\n\nThe squire catches your eye and shrugs, apologetically. \"He's promised me an island, my [ROOT.Char.GetLadyLord]. Well. A barony. Well. He's promised me.\""
 cult_papa.0001.a:0 "No court is complete without a knight of such... vision."
 cult_papa.0001.b:0 "Take this gold for your emprise. Buy a very tall ladder."
 cult_papa.0001.c:0 "Remove this lunatic, his squire, and his 'destrier' from my hall."

 cult_papa.0002.t:0 "The Giant of the Mill"
 cult_papa.0002.desc:0 "Cries from the town: Ser Cult Papa has charged the mill on the hill above your capital, lance couched, at full gallop.\n\nHe had declared its turning sails to be one of the Moon's #EMP earthly engines#! — a great pale-armed giant that grinds moonlight into the tides — and no protest from his squire could hold him. The first sail took his lance, the second took Ser Cult Papa, and the miller's fence took what remained of both.\n\nDragged from the wreckage, bruised but unbowed, the knight explains it all: a jealous enchanter, seeing his victory at hand, transformed the lunar engine into a common windmill at the final instant, purely to rob him of the glory. \"Such,\" he says, spitting out a tooth, \"are the fortunes of war.\"\n\nMoonbane, fiercest destrier in creation, observed the entire engagement from a safe distance, eating the miller's cabbages.\n\nPapaLaCroix asks, very quietly, whether anyone intends to pay the miller."
 cult_papa.0002.a:0 "Pay the miller. Say nothing of enchanters."
 cult_papa.0002.b:0 "Proclaim the mill defeated and the tides avenged."

 cult_papa.0003.t:0 "The Vigil of the Pale Foe"
 cult_papa.0003.desc:0 "Ser Cult Papa has come to a troubling realization: he was never properly knighted. His investiture, he confesses, was performed years ago by an innkeeper he had mistaken for the castellan of a great fortress — and no war against the Moon may be won by a knight of doubtful making.\n\nHe therefore begs of you the old rite, done correctly: a night's vigil over his arms in your chapel, from dusk until moonrise, whereupon you shall gird him with the sword.\n\nHe stands the vigil in perfect solemnity — save that at moonrise, when the pale light falls across the chapel floor, he draws himself up before the window and stares his enemy full in the face, that it may know him.\n\nPapaLaCroix stands the vigil too, in a sense: he fell asleep in the second pew shortly after dusk, and no one has had the heart to move him."
 cult_papa.0003.a:0 "Knight him at moonrise, with full ceremony, before the whole court."
 cult_papa.0003.b:0 "A quick tap of the blade. The Moon need not be kept waiting."

 cult_papa.0004.t:0 "The Knight Wakes"
 cult_papa.0004.desc:0 "A fever has taken Ser Cult Papa, and for six days he has raved of sieges and silver tyrants. On the seventh morning the fever breaks — and something else breaks with it.\n\nHe wakes quiet. His eyes are clear for the first time since he rode into your courtyard, all those years ago.\n\n\"I have been mad,\" he says simply. \"The Moon is only a stone. It never mocked the Dawn, nor dragged the seas in spite. It is only a stone, and I was only a man who wished the world still had monsters in it worth the fighting.\" He turns to his weeping squire. \"PapaLaCroix. Forgive me. There was never any island.\"\n\nPapaLaCroix, sobbing, begs him to rise — says the Moon is up there laughing at them this very moment, says they'll ride out tonight and have it down by harvest. But the knight only smiles, and closes his eyes, and the war against the Moon is over."
 cult_papa.0004.a:0 "He was mad. He was also the best of us."
 cult_papa.0004.b:0 "The Moon will never know how close it came."
 cult_papa.0004.c:0 "There was never any island. There is now. See to it PapaLaCroix gets one."

 cult_papa.0005.t:0 "A Formal Declaration of War"
 cult_papa.0005.desc:0 "Ser Cult Papa has come before the throne with a grievance of protocol: your realm, he observes, has now been prosecuting hostilities against the Moon for some years without ever having formally declared them. \"We are not brigands, my [ROOT.Char.GetLadyLord]. We are not corsairs. There are #EMP forms#!.\"\n\nHe has taken the liberty of having a declaration drawn up. Your chancellor, who insists he only helped with the grammar, reads it aloud. It is addressed to #EMP The Moon, Usurper of the Night, Dragger of Seas, Occupant of the Sky#!. It cites eleven distinct grievances — among them the tides, werewolves, the corruption of cheeses left out overnight, and 'the general insolence of its face' — and demands the enemy's unconditional descent by Michaelmas.\n\nIt wants only your seal. A herald has already been retained who is willing, for a modest fee, to read the declaration aloud from your highest tower at every moonrise until the enemy capitulates.\n\nPapaLaCroix mentions, to no one in particular, that the herald is his cousin."
 cult_papa.0005.a:0 "Bring the wax. If we are to be at war with the Moon, we shall be at war with it properly."
 cult_papa.0005.b:0 "I will not sign this. (He nails it to the chapel door himself that night.)"

 cult_papa.0006.t:0 "The Night the Moon Died"
 cult_papa.0006.desc:0 "Three nights ago, Ser Cult Papa stood upon the battlements and loosed a single arrow at the Moon. The garrison laughed. The arrow, as arrows do, came back down.\n\nTonight, before the whole terrified court, the Moon goes out. It darkens, drowns, and turns the color of blood — and there upon the battlements stands Ser Cult Papa, arms wide, accepting the apologies of the garrison one man at a time. Your court astronomer's cry of 'a common eclipse!' dies in his throat when the old knight turns and asks him, gently, whether #EMP he#! has ever hit the Moon.\n\nBy midnight the enemy has, admittedly, recovered. Ser Cult Papa is unshaken. \"Did you imagine we fought a single tyrant? The Moon is a #EMP dynasty#!, my [ROOT.Char.GetLadyLord]. It dies and is reborn — a new claimant every month, each as pale and insolent as the last. Slay one and its heirs partition the night between them.\" He gazes at the horizon, suddenly very tired. \"We have not been fighting a war. We have been fighting a succession.\"\n\nPapaLaCroix has already begun, quietly, to eat the feast provisions."
 cult_papa.0006.a:0 "A moon died tonight, and my knight slew it. Bring out the good wine for Ser Cult Papa the Moonsbane!"
 cult_papa.0006.b:0 "It appears to have gotten better."

 cult_papa.0007.t:0 "The Lunar War Council"
 cult_papa.0007.desc:0 "It has crept up on you the way these things do.\n\nYour court physician now prescribes against moonlight and bills it as preventive care. Your marshal — a serious man, decorated in three wars — has produced siege plans for the enemy and freely admits the difficulty lies in the approach: no trebuchet can be built to loft a stone so high, and the ladder, though commissioned, is behind schedule. Your court chaplain has ruled the war canonically sound on a technicality he declines to explain. Your spymaster's latest report lists the Moon's confirmed agents operating within the realm: the tides, several owls, and one specific cat.\n\nAt the center of it all sits PapaLaCroix, Quartermaster-General of the Lunar War, keeping the official ledger. #EMP Expenditures#!: one lance (the mill), one tooth (also the mill), one declaration (sealed), forty-one formal insults (delivered from the tower at moonrise; herald's fee waived — family). #EMP Arrows loosed at the enemy#!: one. #EMP Hits#!: disputed.\n\nThey are all waiting for you. There is an empty chair at the head of the table, and the Lunar War Council cannot lawfully open its session without its [ROOT.Char.GetLadyLord]."
 cult_papa.0007.a:0 "Gentlemen. Be seated. What news from the night sky?"
 cult_papa.0007.b:0 "Cancel the ladder. Return the savings to the treasury. Tell no one I was here."

 nick_cult_papa_the_moonsbane:0 "the Moonsbane"

 cult_papa_lunar_blessing:0 "Patron of the Lunar War"
 cult_papa_lunar_blessing_desc:0 "You have funded Ser Cult Papa's high emprise against the Moon. Word of your greatness of soul — or something — spreads."

 cult_papa_moons_gaze:0 "The Moon's Gaze"
 cult_papa_moons_gaze_desc:0 "You turned away the one knight who tried to warn you. Now, on clear nights, you cannot shake the feeling that the Moon is watching you specifically."

 cult_papa_at_war_with_the_moon:0 "At War with the Moon"
 cult_papa_at_war_with_the_moon_desc:0 "Your realm is in a formally declared state of war with the Moon. Grievances are read aloud from the highest tower at every moonrise. No engagements have yet been fought, save one, which is disputed. Morale is, frankly, excellent."

 cult_papa_memory_of_the_knight:0 "Memory of the Moon Knight"
 cult_papa_memory_of_the_knight_desc:0 "Your people still tell of the mad knight who kept vigil against the Moon, and of the [ROOT.Char.GetLadyLord] who gave him a place at court instead of a cell."
